# Development Profile Configuration

# Database Configuration (PostgreSQL) - Development
# Prefer local Postgres for development; override with env vars when needed.
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/openmailer}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}

# JPA Configuration - Development
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Liquibase Configuration - Development
spring.liquibase.enabled=true

# Mail Configuration - Development
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}

# Thymeleaf Configuration - Development
spring.thymeleaf.cache=false

# Logging Configuration - Development
logging.level.root=INFO
logging.level.com.openmailer=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Security Configuration - Development
encryption.key=${ENCRYPTION_KEY:OpenMailerDevKey1234567890123456}
jwt.secret=${JWT_SECRET:openmailer-secret-key-change-this-in-production-to-a-secure-random-value}
jwt.access-token-expiration=${JWT_ACCESS_TOKEN_EXPIRATION:3600000}
jwt.refresh-token-expiration=${JWT_REFRESH_TOKEN_EXPIRATION:604800000}

# Enable detailed error messages in development
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=always
server.error.include-exception=true
