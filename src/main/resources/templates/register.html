<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/auth}"
      lang="en">
<head>
    <title>Register - OpenMailer</title>
    <th:block th:with="pageTitle='Create Account - OpenMailer',
                       pageDescription='Create your OpenMailer account to start managing campaigns, templates, and subscribers.',
                       pageKeywords='register, sign up, email marketing, openmailer'">
    </th:block>
</head>
<body>
<div layout:fragment="content" class="flex items-center justify-center p-4 min-h-screen">
    <div class="w-full max-w-xl">
        <div class="rounded-3xl border border-white/15 bg-white/95 p-8 shadow-2xl backdrop-blur">
            <header class="mb-8 text-center">
                <div class="mx-auto mb-4 flex h-16 w-16 items-center justify-center rounded-2xl bg-slate-900 text-white shadow-lg" aria-hidden="true">
                    <svg class="h-8 w-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                    </svg>
                </div>
                <h1 class="mb-2 text-3xl font-bold text-slate-900">Create your account</h1>
                <p class="text-sm text-slate-600">Set up your workspace and start using OpenMailer.</p>
            </header>

            <div id="alertContainer" class="mb-4 hidden" role="alert" aria-live="assertive" aria-atomic="true">
                <div id="alertBox" class="rounded-xl p-4">
                    <div class="flex items-start">
                        <svg id="alertIcon" class="mr-3 mt-0.5 h-5 w-5 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"></svg>
                        <p id="alertMessage" class="text-sm font-medium"></p>
                    </div>
                </div>
            </div>

            <form id="registerForm" class="space-y-5">
                <div class="grid gap-5 md:grid-cols-2">
                    <div>
                        <label for="firstName" class="mb-2 block text-sm font-medium text-slate-700">First name</label>
                        <input id="firstName" name="firstName" type="text" maxlength="100"
                               class="block w-full rounded-xl border border-slate-300 px-4 py-3 text-slate-900 shadow-sm outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-500"
                               placeholder="Ava">
                    </div>
                    <div>
                        <label for="lastName" class="mb-2 block text-sm font-medium text-slate-700">Last name</label>
                        <input id="lastName" name="lastName" type="text" maxlength="100"
                               class="block w-full rounded-xl border border-slate-300 px-4 py-3 text-slate-900 shadow-sm outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-500"
                               placeholder="Stone">
                    </div>
                </div>

                <div>
                    <label for="username" class="mb-2 block text-sm font-medium text-slate-700">Username</label>
                    <input id="username" name="username" type="text" required minlength="3" maxlength="50" pattern="^[a-zA-Z0-9_]+$"
                           class="block w-full rounded-xl border border-slate-300 px-4 py-3 text-slate-900 shadow-sm outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-500"
                           placeholder="openmailer_admin">
                    <p class="mt-1 text-xs text-slate-500">Letters, numbers, and underscores only.</p>
                </div>

                <div>
                    <label for="email" class="mb-2 block text-sm font-medium text-slate-700">Email address</label>
                    <input id="email" name="email" type="email" required autocomplete="email"
                           class="block w-full rounded-xl border border-slate-300 px-4 py-3 text-slate-900 shadow-sm outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-500"
                           placeholder="you@example.com">
                </div>

                <div>
                    <div class="mb-2 flex items-center justify-between gap-3">
                        <label for="password" class="block text-sm font-medium text-slate-700">Password</label>
                        <span class="text-xs text-slate-500">Min 8 chars, upper/lowercase, number, special</span>
                    </div>
                    <div class="relative">
                        <input id="password" name="password" type="password" required minlength="8" maxlength="100"
                               class="block w-full rounded-xl border border-slate-300 px-4 py-3 pr-12 text-slate-900 shadow-sm outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-500"
                               placeholder="Create a strong password">
                        <button type="button" id="togglePasswordButton"
                                class="absolute inset-y-0 right-0 flex items-center pr-4 text-slate-400 transition hover:text-slate-600"
                                aria-label="Show password" aria-pressed="false">
                            <svg id="eyeIcon" class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                            </svg>
                            <svg id="eyeSlashIcon" class="hidden h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"></path>
                            </svg>
                        </button>
                    </div>
                </div>

                <div>
                    <label for="confirmPassword" class="mb-2 block text-sm font-medium text-slate-700">Confirm password</label>
                    <input id="confirmPassword" name="confirmPassword" type="password" required minlength="8" maxlength="100"
                           class="block w-full rounded-xl border border-slate-300 px-4 py-3 text-slate-900 shadow-sm outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-500"
                           placeholder="Repeat your password">
                </div>

                <button id="submitButton" type="submit"
                        class="flex w-full items-center justify-center rounded-xl bg-blue-600 px-4 py-3 font-semibold text-white transition hover:bg-blue-700 focus:outline-none focus:ring-4 focus:ring-blue-300"
                        aria-label="Create account">
                    <span id="buttonText">Create Account</span>
                    <svg id="loadingSpinner" class="ml-2 hidden h-5 w-5 animate-spin text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                </button>
            </form>

            <div class="mt-6 text-center text-sm text-slate-600">
                Already have an account?
                <a href="/login" class="font-semibold text-blue-600 transition hover:text-blue-700">Sign in</a>
            </div>
        </div>
    </div>
</div>

<th:block layout:fragment="extra-scripts">
    <script th:src="${assetMinified} ? @{/js/min/register.min.js} : @{/js/register.js}"></script>
</th:block>
</body>
</html>
