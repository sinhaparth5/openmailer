<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Fragments</title>
</head>
<body>
    <nav th:fragment="navbar" class="border-b border-slate-200/80 bg-white/88 backdrop-blur-sm" role="navigation" aria-label="Main navigation">
        <div class="container mx-auto px-4">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center space-x-3">
                    <a th:href="@{/}" class="flex items-center" aria-label="OpenMailer home">
                        <img th:src="@{/images/hero.png}" alt="OpenMailer" class="h-10" />
                    </a>
                </div>

                <div class="hidden md:flex items-center space-x-6" role="menubar">
                    <a th:href="@{/dashboard}" class="text-sm font-medium text-slate-700 transition hover:text-slate-950 focus:outline-none focus:ring-2 focus:ring-slate-400 focus:ring-offset-2 rounded px-2 py-1" role="menuitem">Dashboard</a>
                    <a th:href="@{/campaigns}" class="text-sm font-medium text-slate-700 transition hover:text-slate-950 focus:outline-none focus:ring-2 focus:ring-slate-400 focus:ring-offset-2 rounded px-2 py-1" role="menuitem">Campaigns</a>
                    <a th:href="@{/contacts}" class="text-sm font-medium text-slate-700 transition hover:text-slate-950 focus:outline-none focus:ring-2 focus:ring-slate-400 focus:ring-offset-2 rounded px-2 py-1" role="menuitem">Contacts</a>
                    <a th:href="@{/templates}" class="text-sm font-medium text-slate-700 transition hover:text-slate-950 focus:outline-none focus:ring-2 focus:ring-slate-400 focus:ring-offset-2 rounded px-2 py-1" role="menuitem">Templates</a>

                    <div sec:authorize="isAuthenticated()" class="flex items-center space-x-4">
                        <span class="rounded-full bg-slate-100 px-3 py-1 text-xs font-medium text-slate-600" sec:authentication="name" aria-label="Current user">User</span>
                        <form class="inline js-logout-form">
                            <button type="submit" class="rounded-lg border border-slate-300 px-3 py-2 text-sm font-medium text-slate-700 transition hover:border-rose-200 hover:bg-rose-50 hover:text-rose-700 focus:outline-none focus:ring-2 focus:ring-rose-500 focus:ring-offset-2" aria-label="Log out of your account">
                                Logout
                            </button>
                        </form>
                    </div>

                    <div sec:authorize="!isAuthenticated()">
                        <a th:href="@{/login}" class="rounded-lg bg-slate-900 px-4 py-2 text-sm font-semibold text-white transition hover:bg-slate-800 focus:outline-none focus:ring-2 focus:ring-slate-500 focus:ring-offset-2" aria-label="Sign in to your account">
                            Sign In
                        </a>
                    </div>
                </div>

                <div class="md:hidden">
                    <button id="mobileMenuButton" type="button" class="text-gray-700 hover:text-blue-600 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 rounded p-2" aria-label="Toggle mobile menu" aria-expanded="false" aria-controls="mobileMenu">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                        </svg>
                    </button>
                </div>
            </div>

            <div id="mobileMenu" class="hidden md:hidden pb-4" role="menu" aria-label="Mobile navigation">
                <div class="flex flex-col space-y-3">
                    <a th:href="@{/dashboard}" class="text-sm font-medium text-slate-700 transition hover:text-slate-950 focus:outline-none focus:ring-2 focus:ring-slate-400 rounded px-2 py-1" role="menuitem">Dashboard</a>
                    <a th:href="@{/campaigns}" class="text-sm font-medium text-slate-700 transition hover:text-slate-950 focus:outline-none focus:ring-2 focus:ring-slate-400 rounded px-2 py-1" role="menuitem">Campaigns</a>
                    <a th:href="@{/contacts}" class="text-sm font-medium text-slate-700 transition hover:text-slate-950 focus:outline-none focus:ring-2 focus:ring-slate-400 rounded px-2 py-1" role="menuitem">Contacts</a>
                    <a th:href="@{/templates}" class="text-sm font-medium text-slate-700 transition hover:text-slate-950 focus:outline-none focus:ring-2 focus:ring-slate-400 rounded px-2 py-1" role="menuitem">Templates</a>

                    <div sec:authorize="isAuthenticated()" class="pt-3 border-t">
                        <span class="mb-2 block text-sm text-slate-600" sec:authentication="name" aria-label="Current user">User</span>
                        <form class="js-logout-form">
                            <button type="submit" class="rounded-lg border border-slate-300 px-3 py-2 text-sm font-medium text-slate-700 transition hover:border-rose-200 hover:bg-rose-50 hover:text-rose-700 focus:outline-none focus:ring-2 focus:ring-rose-500 rounded px-2 py-1" aria-label="Log out of your account">
                                Logout
                            </button>
                        </form>
                    </div>

                    <div sec:authorize="!isAuthenticated()" class="pt-3 border-t">
                        <a th:href="@{/login}" class="block rounded-lg bg-slate-900 px-4 py-2 text-center text-sm font-semibold text-white transition hover:bg-slate-800 focus:outline-none focus:ring-2 focus:ring-slate-500" aria-label="Sign in to your account">
                            Sign In
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <footer th:fragment="footer" class="mt-auto border-t border-slate-200/80 bg-white/80" role="contentinfo" aria-label="Site footer">
        <div class="container mx-auto flex flex-col gap-3 px-4 py-6 text-sm text-slate-500 md:flex-row md:items-center md:justify-between">
            <p>&copy; <span th:text="${#dates.year(#dates.createNow())}">2025</span> OpenMailer</p>
            <p>Focused on sender setup, audience import, and campaign execution.</p>
        </div>
    </footer>

    <script th:fragment="mobile-menu-script" th:src="${assetMinified} ? @{/js/min/mobile-toggle.min.js} : @{/js/mobile-toggle.js}"></script>
</body>
</html>
