<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  lang="en"
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="_csrf" th:content="${_csrf.token}" />
    <meta name="_csrf_header" th:content="${_csrf.headerName}" />

    <title th:text="${pageTitle} ?: 'OpenMailer'">OpenMailer</title>
    <meta
      name="description"
      th:content="${pageDescription} ?: 'OpenMailer is an open source bulk email system with templates, designed to help you manage and send email campaigns efficiently.'"
    />
    <meta
      name="keywords"
      th:content="${pageKeywords} ?: 'bulk email, email marketing, email templates, open source, email campaigns'"
    />
    <meta name="author" content="OpenMailer" />
    <meta name="robots" content="noindex, nofollow" />

    <link rel="icon" type="image/x-icon" th:href="@{/favicon.ico}" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      th:href="@{/apple-touch-icon.png}"
    />
    <link rel="manifest" th:href="@{/site.webmanifest}" />
    <meta name="theme-color" content="#ddf04e" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="OpenMailer" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" th:href="@{/css/output.css}" />

    <script
      th:src="${assetMinified} ? @{/js/min/alpine-components.min.js} : @{/js/alpine-components.js}"
    ></script>

    <script defer th:src="@{/js/vendor/alpinejs.min.js}"></script>

    <th:block layout:fragment="extra-head"></th:block>

    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("consent", "default", {
        ad_storage: "denied",
        analytics_storage: "denied",
        wait_for_update: 500,
      });
      (function () {
        if (localStorage.getItem("cookie_consent") === "accepted") {
          gtag("consent", "update", {
            analytics_storage: "granted",
            ad_storage: "granted",
          });
        }
      })();
    </script>

    <script>
      (function (w, d, s, l, i) {
        w[l] = w[l] || [];
        w[l].push({ "gtm.start": new Date().getTime(), event: "gtm.js" });
        var f = d.getElementsByTagName(s)[0],
          j = d.createElement(s),
          dl = l != "dataLayer" ? "&l=" + l : "";
        j.async = true;
        j.src = "https://www.googletagmanager.com/gtm.js?id=" + i + dl;
        f.parentNode.insertBefore(j, f);
      })(window, document, "script", "dataLayer", "GTM-TXL68GQG");
    </script>

    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-VXSD75V1ZC"
    ></script>
    <script>
      gtag("js", new Date());
      gtag("config", "G-VXSD75V1ZC");
    </script>
  </head>
  <body class="flex h-screen overflow-hidden antialiased">
    <noscript
      ><iframe
        src="https://www.googletagmanager.com/ns.html?id=GTM-TXL68GQG"
        height="0"
        width="0"
        style="display: none; visibility: hidden"
      ></iframe
    ></noscript>
    <a
      href="#main-content"
      class="sr-only focus:not-sr-only focus:absolute focus:top-0 focus:left-0 focus:z-50 focus:bg-blue-600 focus:text-white focus:px-4 focus:py-2 focus:m-2 focus:rounded"
    >
      Skip to main content
    </a>

    <div
      id="sidebarBackdrop"
      class="fixed inset-0 z-30 hidden bg-black/60 backdrop-blur-[2px] md:hidden"
      aria-hidden="true"
    ></div>

    <aside th:replace="~{layout/fragments :: sidebar}"></aside>

    <div class="flex min-w-0 flex-1 flex-col overflow-y-auto">
      <div
        class="sticky top-0 z-20 flex flex-shrink-0 items-center gap-3 border-b border-[var(--app-border)] bg-[var(--app-bg)]/95 px-4 py-3 backdrop-blur-md md:hidden"
      >
        <button
          id="sidebarToggle"
          type="button"
          class="flex h-9 w-9 items-center justify-center rounded-full border border-[var(--app-border)] bg-white/80 text-slate-600 transition hover:bg-white"
          aria-label="Open navigation menu"
          aria-expanded="false"
          aria-controls="app-sidebar"
        >
          <svg
            class="h-4 w-4"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
            aria-hidden="true"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M4 6h16M4 12h16M4 18h16"
            />
          </svg>
        </button>
        <span
          class="text-sm font-semibold tracking-tight text-[var(--app-text)]"
          >OpenMailer</span
        >
      </div>

      <div class="shrink-0 px-4 pt-4 sm:px-6 sm:pt-5 md:px-8 lg:px-10">
        <div th:replace="~{layout/fragments :: flash-messages}"></div>
      </div>

      <main
        id="main-content"
        class="flex-1 animate-page-in px-4 pb-8 pt-4 sm:px-6 sm:pb-10 md:px-8 md:pt-5 lg:px-10 lg:pt-6"
        layout:fragment="content"
        role="main"
      ></main>
    </div>

    <th:block layout:fragment="extra-scripts"></th:block>
    <script
      th:src="${assetMinified} ? @{/js/min/flash-messages.min.js} : @{/js/flash-messages.js}"
    ></script>
    <script
      th:src="${assetMinified} ? @{/js/min/form-post.min.js} : @{/js/form-post.js}"
    ></script>
    <script
      th:src="${assetMinified} ? @{/js/min/auth.min.js} : @{/js/auth.js}"
    ></script>
    <script
      th:src="${assetMinified} ? @{/js/min/sidebar-toggle.min.js} : @{/js/sidebar-toggle.js}"
    ></script>

    <div
      x-data="cookieConsent()"
      x-show="show"
      x-transition:enter="transition ease-out duration-300"
      x-transition:enter-start="opacity-0 translate-y-4"
      x-transition:enter-end="opacity-100 translate-y-0"
      x-transition:leave="transition ease-in duration-200"
      x-transition:leave-start="opacity-100 translate-y-0"
      x-transition:leave-end="opacity-0 translate-y-4"
      class="fixed bottom-0 left-0 right-0 z-50 border-t border-[var(--app-border)] bg-[var(--app-bg)] px-4 py-4 shadow-lg sm:px-6"
      role="region"
      aria-label="Cookie consent"
    >
      <div
        class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between"
      >
        <p class="text-sm text-[var(--app-text-muted)]">
          We use cookies and analytics to understand how you use OpenMailer and
          improve your experience. See our
          <a
            href="#"
            class="font-medium text-[var(--app-text)] underline underline-offset-2 hover:opacity-80"
            >Privacy Policy</a
          >.
        </p>
        <div class="flex shrink-0 gap-2">
          <button
            @click="decline()"
            class="rounded-lg border border-[var(--app-border)] bg-transparent px-4 py-2 text-sm font-medium text-[var(--app-text-muted)] transition hover:bg-[var(--app-border)]"
          >
            Decline
          </button>
          <button
            @click="accept()"
            class="rounded-lg bg-[var(--app-text)] px-4 py-2 text-sm font-medium text-[var(--app-bg)] transition hover:opacity-80"
          >
            Accept All
          </button>
        </div>
      </div>
    </div>
  </body>
</html>
