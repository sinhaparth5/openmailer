<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/auth}"
      lang="en">
<head>
    <title>403 — Access Denied</title>
    <meta name="description" content="You do not have permission to access this page on OpenMailer.">
    <meta name="robots" content="noindex, nofollow">
</head>
<body>
<section layout:fragment="content"
         class="relative flex min-h-[calc(100vh-3rem)] w-full items-center justify-center overflow-hidden rounded-[32px] border border-slate-200/70 bg-[radial-gradient(circle_at_top_right,_rgba(125,211,252,0.28),_transparent_30%),linear-gradient(135deg,_#f8fafc_0%,_#eef2ff_45%,_#fff7ed_100%)] px-6 py-10 shadow-[0_30px_80px_-40px_rgba(15,23,42,0.45)] sm:px-10">
    <div class="relative w-full max-w-4xl rounded-[28px] border border-slate-200/80 bg-white/80 p-8 shadow-xl backdrop-blur lg:p-12">
        <p class="text-sm font-semibold uppercase tracking-[0.35em] text-slate-500">Error 403</p>
        <h1 class="mt-4 text-4xl font-black tracking-tight text-slate-950 sm:text-5xl">This area is off limits.</h1>
        <p class="mt-4 max-w-2xl text-base leading-7 text-slate-600 sm:text-lg">
            Your account is signed in, but it does not have permission to open this page.
            Switch accounts or head back to a page you can access.
        </p>

        <div class="mt-8 flex flex-wrap gap-3">
            <a th:href="@{/dashboard}"
               class="inline-flex items-center justify-center rounded-full bg-slate-950 px-6 py-3 text-sm font-semibold text-white transition hover:bg-slate-800">
                Go To Dashboard
            </a>
            <a th:href="@{/login}"
               class="inline-flex items-center justify-center rounded-full border border-slate-300 bg-white px-6 py-3 text-sm font-semibold text-slate-700 transition hover:border-slate-400">
                Sign In Again
            </a>
        </div>
    </div>
</section>
</body>
</html>
