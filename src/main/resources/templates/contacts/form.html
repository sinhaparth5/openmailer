<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title th:text="${pageTitle}">Contact Form</title>
</head>
<body>

<main layout:fragment="content" class="container mx-auto px-4 py-8">
    <div class="mx-auto max-w-3xl">
        <div class="mb-8 flex items-start justify-between gap-6">
            <div>
                <h1 class="text-3xl font-semibold text-slate-900" th:text="${mode == 'edit'} ? 'Edit Contact' : 'Add Contact'">Add Contact</h1>
                <p class="mt-2 text-sm text-slate-600">
                    <span th:if="${mode == 'edit'}">Update the stored contact record and subscription state.</span>
                    <span th:unless="${mode == 'edit'}">Create a contact record that can be used in lists, segments, and campaigns.</span>
                </p>
            </div>
            <a href="/contacts" class="rounded-xl border border-slate-300 bg-white px-4 py-2.5 text-sm font-medium text-slate-700 transition hover:bg-slate-50">
                Cancel
            </a>
        </div>

        <form th:action="${mode == 'edit'} ? @{/contacts/{id}/edit(id=${contactForm.id})} : @{/contacts}"
              method="post"
              data-enhanced-post="true"
              class="space-y-6">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <section class="rounded-2xl border border-slate-200 bg-white shadow-sm">
                <div class="border-b border-slate-200 px-6 py-4">
                    <h2 class="text-lg font-semibold text-slate-900">Core Fields</h2>
                </div>
                <div class="grid gap-6 p-6 md:grid-cols-2">
                    <div>
                        <label for="firstName" class="mb-2 block text-sm font-medium text-slate-700">First name</label>
                        <input id="firstName" name="firstName" type="text" th:value="${contactForm.firstName}"
                               class="w-full rounded-xl border border-slate-300 px-4 py-3 text-slate-900 outline-none transition focus:border-slate-900 focus:ring-2 focus:ring-slate-200">
                    </div>
                    <div>
                        <label for="lastName" class="mb-2 block text-sm font-medium text-slate-700">Last name</label>
                        <input id="lastName" name="lastName" type="text" th:value="${contactForm.lastName}"
                               class="w-full rounded-xl border border-slate-300 px-4 py-3 text-slate-900 outline-none transition focus:border-slate-900 focus:ring-2 focus:ring-slate-200">
                    </div>
                    <div class="md:col-span-2">
                        <label for="email" class="mb-2 block text-sm font-medium text-slate-700">Email address</label>
                        <input id="email" name="email" type="email" required th:value="${contactForm.email}"
                               class="w-full rounded-xl border border-slate-300 px-4 py-3 text-slate-900 outline-none transition focus:border-slate-900 focus:ring-2 focus:ring-slate-200">
                    </div>
                    <div>
                        <label for="company" class="mb-2 block text-sm font-medium text-slate-700">Company</label>
                        <input id="company" name="company" type="text" th:value="${contactForm.company}"
                               class="w-full rounded-xl border border-slate-300 px-4 py-3 text-slate-900 outline-none transition focus:border-slate-900 focus:ring-2 focus:ring-slate-200">
                    </div>
                    <div>
                        <label for="phone" class="mb-2 block text-sm font-medium text-slate-700">Phone</label>
                        <input id="phone" name="phone" type="text" th:value="${contactForm.phone}"
                               class="w-full rounded-xl border border-slate-300 px-4 py-3 text-slate-900 outline-none transition focus:border-slate-900 focus:ring-2 focus:ring-slate-200">
                    </div>
                    <div>
                        <label for="country" class="mb-2 block text-sm font-medium text-slate-700">Country</label>
                        <input id="country" name="country" type="text" th:value="${contactForm.country}"
                               class="w-full rounded-xl border border-slate-300 px-4 py-3 text-slate-900 outline-none transition focus:border-slate-900 focus:ring-2 focus:ring-slate-200">
                    </div>
                </div>
            </section>

            <section class="rounded-2xl border border-slate-200 bg-white shadow-sm">
                <div class="border-b border-slate-200 px-6 py-4">
                    <h2 class="text-lg font-semibold text-slate-900">Subscription State</h2>
                </div>
                <div class="space-y-6 p-6">
                    <div>
                        <label class="mb-3 block text-sm font-medium text-slate-700">Status</label>
                        <div class="grid gap-3 sm:grid-cols-3">
                            <label class="flex items-center gap-3 rounded-xl border border-slate-200 p-4">
                                <input type="radio" name="status" value="SUBSCRIBED" th:checked="${contactForm.status == 'SUBSCRIBED'}">
                                <span class="text-sm text-slate-700">Subscribed</span>
                            </label>
                            <label class="flex items-center gap-3 rounded-xl border border-slate-200 p-4">
                                <input type="radio" name="status" value="PENDING" th:checked="${contactForm.status == 'PENDING'}">
                                <span class="text-sm text-slate-700">Pending</span>
                            </label>
                            <label class="flex items-center gap-3 rounded-xl border border-slate-200 p-4">
                                <input type="radio" name="status" value="UNSUBSCRIBED" th:checked="${contactForm.status == 'UNSUBSCRIBED'}">
                                <span class="text-sm text-slate-700">Unsubscribed</span>
                            </label>
                        </div>
                    </div>

                    <div>
                        <label class="mb-3 block text-sm font-medium text-slate-700">Tags</label>
                        <div class="grid gap-3 sm:grid-cols-3">
                            <label class="flex items-center gap-3 rounded-xl border border-slate-200 p-4" th:each="tagOption : ${tagFilters}" th:if="${tagOption.value != ''}">
                                <input type="checkbox" name="tags" th:value="${tagOption.value}" th:checked="${#lists.contains(contactForm.tags, tagOption.value)}">
                                <span class="text-sm text-slate-700" th:text="${tagOption.label}">Tag</span>
                            </label>
                        </div>
                    </div>

                    <label class="flex items-start gap-3 rounded-xl border border-slate-200 p-4">
                        <input type="checkbox" name="gdprConsent" th:checked="${contactForm.gdprConsent}" class="mt-1">
                        <span class="text-sm text-slate-700">
                            <span class="font-medium">GDPR consent recorded</span><br>
                            <span class="text-slate-500">Keep this checked only when you have a valid consent trail.</span>
                        </span>
                    </label>
                </div>
            </section>

            <section class="rounded-2xl border border-slate-200 bg-white shadow-sm">
                <div class="border-b border-slate-200 px-6 py-4">
                    <h2 class="text-lg font-semibold text-slate-900">Internal Notes</h2>
                </div>
                <div class="p-6">
                    <textarea id="notes" name="notes" rows="5" th:text="${contactForm.notes}"
                              class="w-full rounded-xl border border-slate-300 px-4 py-3 text-slate-900 outline-none transition focus:border-slate-900 focus:ring-2 focus:ring-slate-200"
                              placeholder="Anything useful for your team about this contact."></textarea>
                </div>
            </section>

            <div class="flex items-center justify-end gap-3 border-t border-slate-200 pt-6">
                <a href="/contacts" class="rounded-xl border border-slate-300 bg-white px-5 py-2.5 text-sm font-medium text-slate-700 transition hover:bg-slate-50">Cancel</a>
                <button type="submit" class="rounded-xl bg-slate-900 px-5 py-2.5 text-sm font-medium text-white transition hover:bg-slate-800">
                    <span th:text="${mode == 'edit'} ? 'Update Contact' : 'Create Contact'">Create Contact</span>
                </button>
            </div>
        </form>
    </div>
</main>

</body>
</html>
