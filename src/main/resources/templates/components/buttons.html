<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Button Components</title>
</head>
<body>

<!-- Primary Button -->
<button th:fragment="btn-primary"
        class="app-button-primary px-4 py-2 text-sm disabled:cursor-not-allowed disabled:opacity-50">
    <span th:text="${text} ?: 'Button'">Button</span>
</button>

<!-- Secondary Button -->
<button th:fragment="btn-secondary"
        class="app-button-secondary px-4 py-2 text-sm disabled:cursor-not-allowed disabled:opacity-50">
    <span th:text="${text} ?: 'Button'">Button</span>
</button>

<!-- Outline Button -->
<button th:fragment="btn-outline"
        class="inline-flex items-center justify-center rounded-full border border-[rgba(57,48,36,0.14)] bg-transparent px-4 py-2 text-sm font-semibold text-slate-800 transition hover:bg-white/70 focus:outline-none focus:ring-2 focus:ring-slate-500 focus:ring-offset-2 disabled:cursor-not-allowed disabled:opacity-50">
    <span th:text="${text} ?: 'Button'">Button</span>
</button>

<!-- Danger Button -->
<button th:fragment="btn-danger"
        class="inline-flex items-center justify-center rounded-full bg-[#c05645] px-4 py-2 text-sm font-semibold text-white shadow-[0_18px_32px_-24px_rgba(192,86,69,0.5)] transition hover:-translate-y-0.5 hover:bg-[#a84839] focus:outline-none focus:ring-2 focus:ring-[#c05645] focus:ring-offset-2 disabled:cursor-not-allowed disabled:opacity-50">
    <span th:text="${text} ?: 'Delete'">Delete</span>
</button>

<!-- Success Button -->
<button th:fragment="btn-success"
        class="inline-flex items-center justify-center rounded-full bg-[#2f855a] px-4 py-2 text-sm font-semibold text-white shadow-[0_18px_32px_-24px_rgba(47,133,90,0.45)] transition hover:-translate-y-0.5 hover:bg-[#266f4b] focus:outline-none focus:ring-2 focus:ring-[#2f855a] focus:ring-offset-2 disabled:cursor-not-allowed disabled:opacity-50">
    <span th:text="${text} ?: 'Success'">Success</span>
</button>

<!-- Warning Button -->
<button th:fragment="btn-warning"
        class="inline-flex items-center justify-center rounded-full bg-[#d69e2e] px-4 py-2 text-sm font-semibold text-slate-950 shadow-[0_18px_32px_-24px_rgba(214,158,46,0.45)] transition hover:-translate-y-0.5 hover:bg-[#bf8a22] focus:outline-none focus:ring-2 focus:ring-[#d69e2e] focus:ring-offset-2 disabled:cursor-not-allowed disabled:opacity-50">
    <span th:text="${text} ?: 'Warning'">Warning</span>
</button>

<!-- Small Button -->
<button th:fragment="btn-sm"
        class="app-button-primary px-3 py-1.5 text-xs disabled:cursor-not-allowed disabled:opacity-50">
    <span th:text="${text} ?: 'Small'">Small</span>
</button>

<!-- Large Button -->
<button th:fragment="btn-lg"
        class="app-button-primary px-6 py-3 text-base disabled:cursor-not-allowed disabled:opacity-50">
    <span th:text="${text} ?: 'Large Button'">Large Button</span>
</button>

<!-- Loading Button -->
<button th:fragment="btn-loading"
        class="app-button-primary px-4 py-2 text-sm disabled:cursor-not-allowed disabled:opacity-50"
        disabled>
    <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
    </svg>
    <span th:text="${text} ?: 'Loading...'">Loading...</span>
</button>

<!-- Icon Button -->
<button th:fragment="btn-icon"
        class="app-button-primary p-2.5 disabled:cursor-not-allowed disabled:opacity-50">
    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
    </svg>
</button>

<!-- Ghost Button (text only) -->
<button th:fragment="btn-ghost"
        class="inline-flex items-center justify-center rounded-full px-4 py-2 text-sm font-medium text-slate-700 transition hover:bg-white/72 hover:text-slate-950 focus:outline-none focus:ring-2 focus:ring-slate-500 focus:ring-offset-2 disabled:cursor-not-allowed disabled:opacity-50">
    <span th:text="${text} ?: 'Ghost'">Ghost</span>
</button>

<!-- Link Button -->
<button th:fragment="btn-link"
        class="inline-flex items-center justify-center rounded px-1 text-sm font-medium text-slate-700 underline-offset-4 transition hover:text-slate-950 hover:underline focus:outline-none focus:ring-2 focus:ring-slate-500 disabled:cursor-not-allowed disabled:opacity-50">
    <span th:text="${text} ?: 'Link'">Link</span>
</button>

</body>
</html>
