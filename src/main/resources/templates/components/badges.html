<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Badge Components</title>
</head>
<body>

<span th:fragment="status-badge"
      th:class="${
        status == 'DRAFT' ? 'bg-white/70 text-slate-700' :
        status == 'SCHEDULED' ? 'bg-[var(--app-sun)]/70 text-amber-950' :
        status == 'SENDING' ? 'bg-[var(--app-lilac)]/72 text-slate-900' :
        status == 'SENT' ? 'bg-[var(--app-mint)]/72 text-emerald-950' :
        status == 'PAUSED' ? 'bg-[var(--app-peach)]/72 text-rose-950' :
        status == 'FAILED' ? 'bg-[var(--app-peach)]/8 text-rose-950 border border-[rgba(192,86,69,0.18)]' :
        status == 'VERIFIED' ? 'bg-[var(--app-mint)]/72 text-emerald-950' :
        status == 'PENDING' ? 'bg-[var(--app-sun)]/72 text-amber-950' :
        status == 'SUBSCRIBED' ? 'bg-[var(--app-mint)]/72 text-emerald-950' :
        status == 'UNSUBSCRIBED' ? 'bg-[var(--app-peach)]/72 text-rose-950' :
        status == 'BOUNCED' ? 'bg-[var(--app-peach)]/72 text-rose-950' :
        'bg-white/70 text-slate-700'
      }"
      class="inline-flex items-center rounded-full px-3 py-1 text-xs font-medium">
    <span th:text="${status}">Status</span>
</span>

<!-- Success Badge -->
<span th:fragment="badge-success" class="inline-flex items-center rounded-full bg-[var(--app-mint)]/72 px-3 py-1 text-xs font-medium text-emerald-950">
    <svg class="-ml-0.5 mr-1.5 h-2 w-2" fill="currentColor" viewBox="0 0 8 8">
        <circle cx="4" cy="4" r="3" />
    </svg>
    <span th:text="${text} ?: 'Success'">Success</span>
</span>

<!-- Warning Badge -->
<span th:fragment="badge-warning" class="inline-flex items-center rounded-full bg-[var(--app-sun)]/72 px-3 py-1 text-xs font-medium text-amber-950">
    <svg class="-ml-0.5 mr-1.5 h-2 w-2" fill="currentColor" viewBox="0 0 8 8">
        <circle cx="4" cy="4" r="3" />
    </svg>
    <span th:text="${text} ?: 'Warning'">Warning</span>
</span>

<!-- Danger Badge -->
<span th:fragment="badge-danger" class="inline-flex items-center rounded-full bg-[var(--app-peach)]/72 px-3 py-1 text-xs font-medium text-rose-950">
    <svg class="-ml-0.5 mr-1.5 h-2 w-2" fill="currentColor" viewBox="0 0 8 8">
        <circle cx="4" cy="4" r="3" />
    </svg>
    <span th:text="${text} ?: 'Error'">Error</span>
</span>

<!-- Info Badge -->
<span th:fragment="badge-info" class="inline-flex items-center rounded-full bg-[var(--app-lilac)]/72 px-3 py-1 text-xs font-medium text-slate-900">
    <svg class="-ml-0.5 mr-1.5 h-2 w-2" fill="currentColor" viewBox="0 0 8 8">
        <circle cx="4" cy="4" r="3" />
    </svg>
    <span th:text="${text} ?: 'Info'">Info</span>
</span>

<!-- Count Badge -->
<span th:fragment="count-badge" class="inline-flex items-center justify-center rounded-full bg-[#171717] px-2.5 py-1 text-xs font-bold leading-none text-white">
    <span th:text="${count} ?: '0'">0</span>
</span>

<!-- Large Count Badge -->
<span th:fragment="count-badge-lg" class="inline-flex min-w-[2rem] items-center justify-center rounded-full bg-[#171717] px-2.5 py-1 text-sm font-bold text-white">
    <span th:text="${count} ?: '0'">0</span>
</span>

<!-- Removable Badge (Tag) -->
<span th:fragment="tag-badge" class="inline-flex items-center rounded-full bg-white/72 px-3 py-1 text-sm font-medium text-slate-800">
    <span th:text="${text}">Tag</span>
    <button type="button" class="ml-1.5 inline-flex h-4 w-4 flex-shrink-0 items-center justify-center rounded-full text-slate-400 hover:bg-slate-200 hover:text-slate-600 focus:bg-slate-500 focus:text-white focus:outline-none">
        <svg class="h-2 w-2" stroke="currentColor" fill="none" viewBox="0 0 8 8">
            <path stroke-linecap="round" stroke-width="1.5" d="M1 1l6 6m0-6L1 7" />
        </svg>
    </button>
</span>

<!-- Notification Badge (Dot) -->
<span th:fragment="notification-dot" class="relative">
    <span class="absolute top-0 right-0 block h-2 w-2 rounded-full bg-red-500 ring-2 ring-white"></span>
</span>

<!-- Percentage Badge -->
<span th:fragment="percentage-badge"
      th:class="${
        percentage >= 70 ? 'bg-[var(--app-mint)]/72 text-emerald-950' :
        percentage >= 40 ? 'bg-[var(--app-sun)]/72 text-amber-950' :
        'bg-[var(--app-peach)]/72 text-rose-950'
      }"
      class="inline-flex items-center rounded-full px-3 py-1 text-xs font-medium">
    <span th:text="${percentage} + '%'">0%</span>
</span>

<!-- New Badge -->
<span th:fragment="badge-new" class="inline-flex items-center rounded-full bg-[#171717] px-2.5 py-1 text-[11px] font-semibold text-white">
    NEW
</span>

<!-- Beta Badge -->
<span th:fragment="badge-beta" class="inline-flex items-center rounded-full bg-[var(--app-lilac)]/82 px-2.5 py-1 text-[11px] font-semibold text-slate-900">
    BETA
</span>

</body>
</html>
