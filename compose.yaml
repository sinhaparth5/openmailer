services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openmailer-app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: 8080
      APP_BASE_URL: http://localhost:8080
      DATABASE_URL: jdbc:postgresql://postgres:5432/openmailer
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: postgres
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      CACHE_TYPE: redis
      ENCRYPTION_KEY: cd18b33b46ab2d5ccced4f4ea20da280
      JWT_SECRET: hbJkYjW4i9KxlUb9LU7+QjP5UIphJqzWH6IqAP5gYuo=
      JWT_ACCESS_TOKEN_EXPIRATION: 3600000
      JWT_REFRESH_TOKEN_EXPIRATION: 604800000
      MAIL_HOST: smtp.ethereal.email
      MAIL_PORT: 587
      MAIL_USERNAME: cory.mills@ethereal.email
      MAIL_PASSWORD: 1k1zdXapjsuyV8TCD2
      APP_MAIL_FROM: cory.mills@ethereal.email
      APP_TEST_EMAIL_RECIPIENT: cory.mills@ethereal.email
      APP_ASSETS_MINIFIED: "true"
    expose:
      - "8080"
    networks:
      - bw-services
      - default
    labels:
      - "bunkerweb.SERVER_NAME=localhost"
      - "bunkerweb.USE_REVERSE_PROXY=yes"
      - "bunkerweb.REVERSE_PROXY_URL=/"
      - "bunkerweb.REVERSE_PROXY_HOST=http://app:8080"
      - "bunkerweb.REVERSE_PROXY_INTERCEPT_ERRORS=no"
      - "bunkerweb.ALLOWED_METHODS=GET|POST|PUT|PATCH|DELETE|OPTIONS"
      - "bunkerweb.USE_LIMIT_REQ=yes"
      - "bunkerweb.LIMIT_REQ_URL=/"
      - "bunkerweb.LIMIT_REQ_RATE=20r/s"
      - "bunkerweb.LIMIT_REQ_URL_2=^/api/auth"
      - "bunkerweb.LIMIT_REQ_RATE_2=10r/m"
      - "bunkerweb.USE_BAD_BEHAVIOR=yes"
      - "bunkerweb.USE_BUNKERNET=no"
      - "bunkerweb.BAD_BEHAVIOR_STATUS_CODES=400 401 403 404 405 429 444"
      - "bunkerweb.BAD_BEHAVIOR_THRESHOLD=8"
      - "bunkerweb.BAD_BEHAVIOR_COUNT_TIME=60"
      - "bunkerweb.BAD_BEHAVIOR_BAN_TIME=3600"
      - "bunkerweb.BAD_BEHAVIOR_BAN_SCOPE=service"
      - "bunkerweb.USE_BLACKLIST=yes"
      - "bunkerweb.BLACKLIST_URI=^/wp-admin/?$ ^/wp-login\\.php$ ^/xmlrpc\\.php$ ^/\\.env$ ^/server-status$"
      - "bunkerweb.PERMISSIONS_POLICY=accelerometer=(), autoplay=(), camera=(), display-capture=(), encrypted-media=(), fullscreen=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), midi=(), payment=(), picture-in-picture=(), publickey-credentials-get=(), screen-wake-lock=(), usb=(), web-share=(), xr-spatial-tracking=()"
      - "bunkerweb.FEATURE_POLICY="

  bunkerweb:
    image: bunkerity/bunkerweb:1.4.0
    container_name: openmailer-bunkerweb
    depends_on:
      - app
    ports:
      - "8080:8080"
      - "8443:8443"
    volumes:
      - bw-data:/data
    environment:
      MULTISITE: "yes"
      SERVER_NAME: ""
      USE_BUNKERNET: "no"
      API_WHITELIST_IP: "127.0.0.0/8 10.20.30.0/24 172.16.0.0/12"
    labels:
      - "bunkerweb.AUTOCONF"
    networks:
      - bw-autoconf
      - bw-services

  bunkerweb-autoconf:
    image: bunkerity/bunkerweb-autoconf:1.4.0
    container_name: openmailer-bunkerweb-autoconf
    depends_on:
      - bunkerweb
    volumes:
      - bw-data:/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - bw-autoconf

  postgres:
    image: postgres:17-alpine
    container_name: openmailer-postgres
    environment:
      POSTGRES_DB: openmailer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d openmailer"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    container_name: openmailer-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  bw-data:
  postgres_data:
  redis_data:

networks:
  bw-autoconf:
  bw-services:
